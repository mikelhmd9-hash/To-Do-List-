<!DOCTYPE html>
<html>
  <head>
    <title>To-Do Liste</title>
    <style>
  body {
    font-family: Arial;
    max-width: 400px;
    margin: 30px auto;
    padding: 10px;
    background: #f0f0f0;
  }

  h1 {
    color: #333;
    text-align: center;
  }

  input {
    padding: 8px;
    width: 70%;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    padding: 8px 12px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
  }

  li {
    background: white;
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
    list-style: none;
  }
</style>
  </head>
  <body>
    <h1>Ma To-Do Liste</h1>
    <input id="tache" type="text" placeholder="Écrire une tâche...">
    <button onclick="ajouterTache()">Ajoute</button>
    <ul id="liste"></ul>
    <script>
     function ajouterTache() {
       let tache = document.getElementById("tache").value; 
       if (tache == "") {
         alert("Écris une tâche d'abord");
       } else {
          let li = document.createElement("li");
       li.innerText = tache;
       let bouton = document.createElement("button");
       bouton.innerText = "✗";
       bouton.onclick = function() {
         li.remove();
       };
       li.appendChild(bouton);
       document.getElementById("liste").appendChild(li);
       document.getElementById("tache").value = "";
     }
     }
    </script>
  </body>
</html>
